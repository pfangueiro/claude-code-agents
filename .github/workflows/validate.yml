name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-syntax:
    name: shell syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: bash -n every shell script
        run: |
          set -e
          find . -name '*.sh' -not -path './.git/*' -not -path './.claude-backup-*' \
            | xargs -I{} bash -n {}
          echo "all shell scripts pass syntax check"

  validate:
    name: ./validate.sh
    runs-on: ubuntu-latest
    needs: shell-syntax
    steps:
      - uses: actions/checkout@v5
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: run validate.sh
        run: ./validate.sh

  yaml-lint:
    name: yaml syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: validate yaml files
        run: |
          python3 -c "
          import sys, yaml, glob
          ok = True
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              if '.git/' in f or '.claude-backup' in f:
                  continue
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'ok  {f}')
              except yaml.YAMLError as e:
                  print(f'FAIL {f}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "
